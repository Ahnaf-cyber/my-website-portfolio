<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Development - AS Cyber Web</title>
    <style>
        body { 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 120px 20px 40px; 
            margin: 0;
            overflow-x: hidden;
            box-sizing: border-box;
        }
        h1 { 
            color: #00ffcc; 
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            margin-bottom: 20px;
        }
        p {
            color: #9ca3af;
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 40px auto;
            line-height: 1.6;
            overflow-wrap: anywhere;
        }
        a { 
            display: inline-block;
            color: #00ffcc; 
            text-decoration: none; 
            border: 2px solid #00ffcc; 
            padding: 12px 30px; 
            border-radius: 5px; 
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            max-width: 100%;
        }
        a:hover { 
            color: #050505; 
            background-color: #00ffcc;
            box-shadow: 0 0 15px #00ffcc;
            transform: translateY(-3px);
        }

        @media (max-width: 480px) {
            body {
                padding-top: 100px;
            }

            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
            }

            a {
                width: 100%;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>
    <h1>Software Development</h1>
    <p>We build scalable, high-performing desktop, mobile, and custom enterprise applications tailor-made to automate and optimize your business workflows.</p>
    <a href="index.html">Go Back Home</a>
</body>
</html>
